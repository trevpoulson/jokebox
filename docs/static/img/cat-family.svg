<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <!-- Placeholder vintage vignette: grinning kid in a propeller beanie.
       Replace by dropping cat-family.png in this folder (PNG wins automatically). -->
  <defs>
    <pattern id="dots-fam" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.5" fill="#2B1B10" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="600" height="200" fill="#78893B"/>
  <rect width="600" height="200" fill="url(#dots-fam)"/>
  <!-- bouncy circles + squiggles -->
  <circle cx="86" cy="52" r="22" fill="#F4E6C0" opacity="0.5"/>
  <circle cx="516" cy="150" r="28" fill="#F4E6C0" opacity="0.5"/>
  <circle cx="540" cy="48" r="14" fill="#F4E6C0" opacity="0.5"/>
  <path d="M60 150 q14 -12 28 0 q14 12 28 0" fill="none" stroke="#F4E6C0" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <path d="M470 80 q14 -12 28 0 q14 12 28 0" fill="none" stroke="#F4E6C0" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <!-- head -->
  <circle cx="300" cy="118" r="64" fill="#F4E6C0" stroke="#2B1B10" stroke-width="5"/>
  <!-- ears -->
  <circle cx="238" cy="118" r="13" fill="#F4E6C0" stroke="#2B1B10" stroke-width="5"/>
  <circle cx="362" cy="118" r="13" fill="#F4E6C0" stroke="#2B1B10" stroke-width="5"/>
  <!-- beanie -->
  <path d="M248 92 a 64 64 0 0 1 104 0 q-26 -13 -52 -13 q-26 0 -52 13 Z" fill="#B5432E" stroke="#2B1B10" stroke-width="5"/>
  <path d="M273 74 q27 -10 54 0" fill="none" stroke="#2B1B10" stroke-width="4"/>
  <!-- propeller -->
  <line x1="300" y1="62" x2="300" y2="44" stroke="#2B1B10" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="266" cy="40" rx="32" ry="10" fill="#D9A036" stroke="#2B1B10" stroke-width="4"/>
  <ellipse cx="334" cy="40" rx="32" ry="10" fill="#D96C2E" stroke="#2B1B10" stroke-width="4"/>
  <circle cx="300" cy="40" r="7" fill="#2B1B10"/>
  <!-- motion whooshes off the propeller -->
  <path d="M226 32 q-14 4 -24 0" fill="none" stroke="#F4E6C0" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <path d="M374 32 q14 4 24 0" fill="none" stroke="#F4E6C0" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <!-- eyes -->
  <circle cx="276" cy="112" r="6.5" fill="#2B1B10"/>
  <circle cx="324" cy="112" r="6.5" fill="#2B1B10"/>
  <!-- freckles -->
  <circle cx="256" cy="132" r="2.5" fill="#2B1B10" opacity="0.5"/>
  <circle cx="265" cy="139" r="2.5" fill="#2B1B10" opacity="0.5"/>
  <circle cx="344" cy="132" r="2.5" fill="#2B1B10" opacity="0.5"/>
  <circle cx="335" cy="139" r="2.5" fill="#2B1B10" opacity="0.5"/>
  <!-- big goofy grin with tooth gap -->
  <path d="M266 140 q34 30 68 0 q-13 22 -34 22 q-21 0 -34 -22 Z" fill="#2B1B10"/>
  <rect x="291" y="143" width="18" height="9" rx="2.5" fill="#F4E6C0"/>
</svg>
